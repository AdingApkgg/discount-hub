name: Tauri Build

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Web URL the Tauri shell loads (e.g. https://your-domain.com)"
        required: true
        default: "https://example.com"
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DISCOUNT_HUB_WEB_URL: ${{ github.event.inputs.web_url || vars.DISCOUNT_HUB_WEB_URL || 'https://example.com' }}

jobs:
  # ─── Windows (.msi + .exe) ──────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/mobile/src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        run: pnpm --filter mobile desktop:build
        env:
          DISCOUNT_HUB_WEB_URL: ${{ env.DISCOUNT_HUB_WEB_URL }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            apps/mobile/src-tauri/target/release/bundle/msi/*.msi
            apps/mobile/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ─── Android (.apk) ─────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.2.12803"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/mobile/src-tauri -> target

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Tauri Android
        working-directory: apps/mobile
        run: pnpm tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12803

      - name: Build Tauri (Android)
        working-directory: apps/mobile
        run: pnpm tauri android build --apk
        env:
          DISCOUNT_HUB_WEB_URL: ${{ env.DISCOUNT_HUB_WEB_URL }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12803

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android
          path: |
            apps/mobile/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
